<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin RT/RW – PilahIn</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="dashboard" id="app" style="display:none">
  <div class="dash-header" style="background:linear-gradient(135deg,#1565c0,#42a5f5)">
    <div>
      <h1 style="color:#fff">Admin RT/RW</h1>
      <div class="greeting" style="color:rgba(255,255,255,.8)" id="greeting">-</div>
    </div>
    <div class="avatar blue" id="avatarBtn" style="background:rgba(255,255,255,.25);color:#fff">A</div>
  </div>

  <!-- Tab: Dashboard -->
  <div class="dash-body" id="tab-home">
    <div class="stat-grid" style="margin-top:16px">
      <div class="stat-card">
        <div class="label">Total Request</div>
        <div class="value blue" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Menunggu</div>
        <div class="value" style="color:#e65100" id="statMenunggu">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Dijadwalkan</div>
        <div class="value blue" id="statJadwal">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Selesai</div>
        <div class="value" style="color:#2d6a4f" id="statSelesai">0</div>
      </div>
    </div>
    <div class="section-title">Request Masuk</div>
    <div id="requestList"></div>
  </div>

  <!-- Tab: Jadwal -->
  <div class="dash-body" id="tab-jadwal" style="display:none">
    <div class="section-title" style="margin-top:16px">Request Dijadwalkan</div>
    <div id="jadwalList"></div>
  </div>

  <!-- Tab: Profil -->
  <div class="dash-body" id="tab-profil" style="display:none">
    <div style="margin-top:16px">
      <div class="profile-header">
        <div class="profile-avatar blue" id="profAvatar">A</div>
        <div class="profile-name" id="profNama">-</div>
        <div class="profile-role" id="profWilayah">Admin RT/RW</div>
      </div>
      <div class="menu-list">
        <a href="#" onclick="if(confirm('Yakin logout?')){auth.logout();location.href='../index.html';}return false" style="color:#c62828">
          <span class="micon">🚪</span><span>Logout</span><span class="chevron">›</span>
        </a>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item active blue" onclick="switchTab('home')" href="#">
      <span class="nav-icon">🏠</span><span>Dashboard</span>
    </a>
    <a class="nav-item" onclick="switchTab('jadwal')" href="#">
      <span class="nav-icon">📅</span><span>Jadwal</span>
    </a>
    <a class="nav-item" onclick="switchTab('profil')" href="#">
      <span class="nav-icon">👤</span><span>Profil</span>
    </a>
  </nav>
</div>

<!-- Modal: Jadwalkan Pickup -->
<div class="overlay" id="overlay">
  <div class="modal">
    <span class="modal-close" onclick="closeModal()">✕</span>
    <h2 id="modalTitle">Jadwalkan Pickup</h2>
    <div id="modalDetail" style="background:#f5f5f5;border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;line-height:1.8"></div>
    <div class="form-group">
      <label style="color:var(--blue)">📅 Tanggal & Waktu Pickup</label>
      <input type="datetime-local" id="jadwalInput">
    </div>
    <div class="form-group">
      <label style="color:var(--blue)">📝 Catatan Jadwal</label>
      <input type="text" id="jadwalNote" placeholder="Contoh: Harap siapkan di depan rumah">
    </div>
    <button class="btn blue" onclick="jadwalkanPickup()" style="margin-bottom:10px">✅ Jadwalkan</button>
    <button class="btn outline-red" onclick="tolakRequest()">✕ Tolak Request</button>
  </div>
</div>

<script src="../assets/js/app.js"></script>
<script>
let user, activeReqId;

window.onload = function() {
  user = auth.require('admin');
  if (!user) return;
  document.getElementById('app').style.display = 'flex';
  document.getElementById('greeting').textContent = 'Halo, ' + user.nama + '!';
  document.getElementById('avatarBtn').textContent = user.nama[0].toUpperCase();
  document.getElementById('profAvatar').textContent = user.nama[0].toUpperCase();
  document.getElementById('profNama').textContent = user.nama;
  document.getElementById('profWilayah').textContent = user.wilayah || 'Admin RT/RW';
  renderDashboard();
};

function allRequests() { return db.get('requests', []).sort((a,b) => b.tglRequest - a.tglRequest); }

function renderDashboard() {
  const reqs = allRequests();
  document.getElementById('statTotal').textContent = reqs.length;
  document.getElementById('statMenunggu').textContent = reqs.filter(r => r.status === 'menunggu').length;
  document.getElementById('statJadwal').textContent = reqs.filter(r => r.status === 'dijadwalkan').length;
  document.getElementById('statSelesai').textContent = reqs.filter(r => r.status === 'selesai').length;

  const incoming = reqs.filter(r => r.status === 'menunggu');
  document.getElementById('requestList').innerHTML = incoming.length
    ? incoming.map(r => itemHtml(r, true)).join('')
    : '<div class="empty-state"><div class="icon">✅</div><p>Tidak ada request menunggu</p></div>';

  const scheduled = reqs.filter(r => r.status === 'dijadwalkan');
  document.getElementById('jadwalList').innerHTML = scheduled.length
    ? scheduled.map(r => itemHtml(r, false)).join('')
    : '<div class="empty-state"><div class="icon">📅</div><p>Belum ada jadwal pickup</p></div>';
}

function itemHtml(r, showBtn) {
  return `<div class="list-item">
    <div class="icon">🗑️</div>
    <div class="info">
      <div class="title">${r.wargaNama} · ${r.jenisSampah} (${r.beratKg} kg)</div>
      <div class="meta">${r.wargaAlamat}</div>
      <div class="meta">${fmtDate(r.tglRequest)} ${r.jadwalStr ? '· Pickup: '+r.jadwalStr : ''}</div>
      ${r.catatan ? `<div class="meta">📝 ${r.catatan}</div>` : ''}
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
      ${badgeHtml(r.status)}
      ${showBtn ? `<button onclick="openModal('${r.id}')" style="font-size:11px;padding:4px 10px;border:1.5px solid #1565c0;border-radius:20px;background:transparent;color:#1565c0;cursor:pointer">Jadwalkan</button>` : ''}
    </div>
  </div>`;
}

function switchTab(tab) {
  ['home','jadwal','profil'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    const active = ['home','jadwal','profil'][i] === tab;
    el.classList.toggle('active', active);
    el.classList.toggle('blue', active);
  });
  renderDashboard();
}

function openModal(id) {
  activeReqId = id;
  const r = db.get('requests', []).find(x => x.id === id);
  if (!r) return;
  document.getElementById('modalDetail').innerHTML =
    `<b>Warga:</b> ${r.wargaNama}<br><b>Alamat:</b> ${r.wargaAlamat}<br><b>Sampah:</b> ${r.jenisSampah} · ${r.beratKg} kg${r.catatan ? '<br><b>Catatan:</b> ' + r.catatan : ''}`;
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); activeReqId = null; }

function jadwalkanPickup() {
  const dt = document.getElementById('jadwalInput').value;
  if (!dt) { toast('Pilih tanggal & waktu pickup', 'error'); return; }
  const note = document.getElementById('jadwalNote').value.trim();
  const d = new Date(dt);
  const jadwalStr = d.toLocaleDateString('id-ID', {day:'numeric',month:'short'}) + ', ' + d.toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'});
  const reqs = db.get('requests', []);
  const idx = reqs.findIndex(r => r.id === activeReqId);
  if (idx === -1) return;
  reqs[idx].status = 'dijadwalkan';
  reqs[idx].jadwalStr = jadwalStr;
  reqs[idx].jadwalNote = note;
  reqs[idx].tglPickup = d.getTime();
  db.set('requests', reqs);
  closeModal();
  renderDashboard();
  toast('Pickup berhasil dijadwalkan! 📅');
}

function tolakRequest() {
  if (!confirm('Tolak request ini?')) return;
  const reqs = db.get('requests', []);
  const idx = reqs.findIndex(r => r.id === activeReqId);
  if (idx === -1) return;
  reqs[idx].status = 'ditolak';
  db.set('requests', reqs);
  closeModal();
  renderDashboard();
  toast('Request ditolak.', 'error');
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
