<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PilahIn</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="page green-bg">
  <div class="app-icon green">♻️</div>
  <h1 class="app-title green">PilahIn</h1>
  <p class="app-subtitle">Pilah sampahmu, jaga lingkunganmu</p>

  <div class="role-cards">
    <a class="role-card" href="login/warga.html">
      <div class="role-icon green">🏠</div>
      <div class="role-info">
        <h3>Warga</h3>
        <p>Catat & request pickup sampah</p>
      </div>
      <span class="role-arrow">→</span>
    </a>
    <a class="role-card" href="login/admin.html">
      <div class="role-icon blue">🛡️</div>
      <div class="role-info">
        <h3>Admin RT/RW</h3>
        <p>Kelola request & jadwal warga</p>
      </div>
      <span class="role-arrow">→</span>
    </a>
    <a class="role-card" href="login/tps.html">
      <div class="role-icon orange">🚛</div>
      <div class="role-info">
        <h3>Pengelola TPS</h3>
        <p>Konfirmasi pickup lapangan</p>
      </div>
      <span class="role-arrow">→</span>
    </a>
  </div>
</div>
<script src="assets/js/app.js"></script>
</body>
</html>
