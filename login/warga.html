<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Warga – PilahIn</title>
<link rel="stylesheet" href="../assets/css/style.css">
<style> :root { --accent: #52b788; } </style>
</head>
<body>
<a class="back-btn" href="../index.html">←</a>

<div class="page green-bg" style="padding-top:60px">
  <div class="app-icon green">♻️</div>
  <h1 class="app-title green">Login Warga</h1>
  <p class="app-subtitle">Masuk untuk mengelola sampah Anda</p>

  <div id="alert" class="alert error" style="display:none;width:100%;max-width:420px"></div>

  <form id="loginForm" style="width:100%;max-width:420px">
    <div class="form-group">
      <label>👤 Username</label>
      <input type="text" id="username" placeholder="Masukkan username" required>
    </div>
    <div class="form-group">
      <label>🔒 Password</label>
      <input type="password" id="password" placeholder="Masukkan password" required>
    </div>
    <button type="submit" class="btn green">Masuk</button>
    <p class="link-row">Belum punya akun? <a href="warga-register.html">Daftar</a></p>
  </form>
</div>

<script src="../assets/js/app.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const user = auth.login('warga', username, password);
  if (!user) {
    const al = document.getElementById('alert');
    al.textContent = 'Username atau password salah.';
    al.style.display = 'block';
    return;
  }
  auth.setSession('warga', user);
  location.href = '../warga/dashboard.html';
});
</script>
</body>
</html>
